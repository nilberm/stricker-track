services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sticker_track}
      POSTGRES_USER: ${POSTGRES_USER:-sticker_track}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sticker_track}
    ports:
      - '${POSTGRES_PORT:-55432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-sticker_track} -d ${POSTGRES_DB:-sticker_track}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sticker_track}:${POSTGRES_PASSWORD:-sticker_track}@postgres:5432/${POSTGRES_DB:-sticker_track}?schema=public
      JWT_SECRET: ${JWT_SECRET:-development-only-secret-change-me}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-86400}
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
        NEXT_PUBLIC_BUY_ME_A_COFFEE_URL: ${NEXT_PUBLIC_BUY_ME_A_COFFEE_URL:-}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_BUY_ME_A_COFFEE_URL: ${NEXT_PUBLIC_BUY_ME_A_COFFEE_URL:-}
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
