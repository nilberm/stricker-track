services:
  postgres:
    restart: unless-stopped
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  api:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-3600}
      APP_URL: ${APP_URL:?APP_URL is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      WIKIDATA_USER_AGENT: ${WIKIDATA_USER_AGENT:?WIKIDATA_USER_AGENT is required}
      EXTERNAL_PROVIDER_TIMEOUT_MS: ${EXTERNAL_PROVIDER_TIMEOUT_MS:-8000}
      EXTERNAL_PROVIDER_RETRY_LIMIT: ${EXTERNAL_PROVIDER_RETRY_LIMIT:-1}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SWAGGER_ENABLED: "false"
    ports: !override
      - "127.0.0.1:3001:3001"

  web:
    restart: unless-stopped
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_BUY_ME_A_COFFEE_URL: ${NEXT_PUBLIC_BUY_ME_A_COFFEE_URL:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
    ports: !override
      - "127.0.0.1:3000:3000"
